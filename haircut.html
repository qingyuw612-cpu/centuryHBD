<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>✂️ 理发游戏 - Century</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/haircut.css">
</head>
<body data-bgm="off">
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <!-- Story Dialog -->
  <div id="story-dialog">
    <div class="story-card">
      <div class="story-icon">💇</div>
      <p class="story-text">为了给 Century 庆祝生日，<br>你决定去兼职当理发师。<br>今天是你工作的第一天。</p>
      <button class="btn" id="story-start">开始上班 ✂️</button>
    </div>
  </div>

  <div id="game-container">
    <canvas id="haircut-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-round">第 1 / 4 轮</div>
      <div id="hud-score">0 分</div>
    </div>

    <!-- Target hint -->
    <div id="target-hint">🎯 对准金色线剪！</div>

    <!-- Speech bubble -->
    <div id="speech-bubble" class="hidden"></div>

    <!-- Cut Button -->
    <button id="cut-btn">
      <span>✂️ 剪！</span>
    </button>

    <!-- Round result popup -->
    <div id="round-popup" class="hidden">
      <div id="round-popup-text"></div>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="results-card">
        <h2 class="results-title" id="results-title">下班！</h2>
        <div class="results-grade" id="results-grade">S</div>
        <p class="results-comment" id="results-comment"></p>
        <div class="results-stats">
          <div class="stat-row"><span class="stat-label">总分</span><span class="stat-value" id="res-score">0</span></div>
          <div class="stat-row"><span class="stat-label">Perfect</span><span class="stat-value perfect-color" id="res-perfect">0</span></div>
          <div class="stat-row"><span class="stat-label">被骂次数</span><span class="stat-value miss-color" id="res-insults">0</span></div>
        </div>
        <div class="results-buttons">
          <button class="btn" onclick="location.reload()">再上一次班</button>
          <a href="index.html" class="btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">返回首页</a>
        </div>
      </div>
    </div>
  </div>

  <noscript><div>请启用 JavaScript 以运行此游戏。</div></noscript>

  <script src="js/common.js"></script>
  <script src="js/haircut.js"></script>
</body>
</html>
