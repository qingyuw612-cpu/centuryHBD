<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍄 猫与蘑菇 - Century</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/story.css">
</head>
<body>
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <div id="story-container">
    <!-- Background scene -->
    <div id="scene-bg"></div>

    <!-- Character sprite area -->
    <div id="character-area">
      <div id="character-sprite"></div>
    </div>

    <!-- Dialogue box -->
    <div id="dialogue-box">
      <div id="speaker-name"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-indicator">▼ 点击继续</div>
    </div>

    <!-- Choices -->
    <div id="choices"></div>

    <!-- Combat overlay -->
    <div id="combat-overlay" class="hidden">
      <div id="combat-hud">
        <div class="combat-hp-bar"><div id="player-hp-fill"></div><span>我</span></div>
        <div class="combat-hp-bar"><div id="enemy-hp-fill"></div><span>魔术师</span></div>
      </div>
      <div id="combat-area">
        <div id="enemy-sprite">🧙‍♂️</div>
        <div id="player-sprite">⚔️</div>
      </div>
      <div id="combat-actions">
        <button class="btn combat-btn" id="btn-attack">⚔️ 攻击</button>
        <button class="btn combat-btn" id="btn-defend">🛡️ 防御</button>
      </div>
      <div id="combat-log"></div>
    </div>

    <!-- Ending screen -->
    <div id="ending-screen" class="hidden">
      <div id="ending-content"></div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/story.js"></script>
</body>
</html>
