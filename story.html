<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍄 猫与蘑菇 - Century</title>
  <link rel="stylesheet" href="assets/fonts/local-fonts.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/story.css">
</head>
<body data-bgm="storybgm.mp3">
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <div id="story-container">
    <!-- Background layers -->
    <div id="scene-bg">
      <div id="bg-overlay"></div>
      <div id="bg-particles"></div>
    </div>

    <!-- Main VN area -->
    <div id="vn-main">
      <!-- Character sprite zone -->
      <div id="sprite-zone">
        <div id="sprite-left" class="vn-sprite"></div>
        <div id="sprite-center" class="vn-sprite"></div>
        <div id="sprite-right" class="vn-sprite"></div>
      </div>

      <!-- Dialogue panel -->
      <div id="dialogue-panel">
        <div id="dialogue-avatar">
          <div id="avatar-frame">
            <span id="avatar-emoji"></span>
          </div>
        </div>
        <div id="dialogue-body">
          <div id="speaker-name"></div>
          <div id="dialogue-text"></div>
        </div>
        <div id="dialogue-next">▼</div>
      </div>
    </div>

    <!-- Click hint -->
    <div id="click-hint">点击任意处继续 ▼</div>

    <!-- Choices -->
    <div id="choices" class="hidden"></div>

    <!-- Combat -->
    <div id="combat-overlay" class="hidden">
      <div id="combat-scene">
        <div id="combat-enemy">
          <div id="enemy-avatar">🧙‍♂️</div>
          <div id="enemy-name">魔术师</div>
          <div class="hp-bar"><div id="enemy-hp-fill"></div></div>
        </div>
        <div id="combat-vs">⚡</div>
        <div id="combat-player">
          <div id="player-avatar">⚔️</div>
          <div id="player-name">我</div>
          <div class="hp-bar"><div id="player-hp-fill"></div></div>
        </div>
      </div>
      <div id="combat-log"></div>
      <div id="combat-actions">
        <button class="btn combat-btn" id="btn-attack">攻击</button>
        <button class="btn combat-btn" id="btn-defend">防御</button>
      </div>
    </div>

    <!-- Ending -->
    <div id="ending-screen" class="hidden">
      <div id="ending-content"></div>
    </div>
  </div>

  <script src="js/common.js"></script>
  <script src="js/story.js"></script>
</body>
</html>
