<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🥁 打鼓游戏 - Century</title>
  <link rel="stylesheet" href="assets/fonts/local-fonts.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/drum.css">
</head>
<body data-bgm="off">
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <!-- Story Dialog -->
  <div id="story-dialog">
    <div class="story-card">
      <div class="story-icon">🎂</div>
      <p class="story-text">生日快乐歌已经响了。<br>拿起鼓棒，跟上节奏。</p>
      <button class="btn" id="story-start">开始演奏</button>
    </div>
  </div>

  <div id="game-container">
    <canvas id="drum-canvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div id="hud-score">0</div>
      <div id="hud-combo"></div>
      <div id="hud-accuracy">--%</div>
    </div>

    <div id="countdown"></div>
    <div id="judgment-popup"></div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="results-card">
        <h2 class="results-title">演奏结束</h2>
        <div class="results-grade" id="results-grade">S</div>
        <div class="results-title-text" id="results-title-text">灵魂鼓手</div>
        <div class="results-stats">
          <div class="stat-row"><span class="stat-label">总分</span><span class="stat-value" id="res-score">0</span></div>
          <div class="stat-row"><span class="stat-label">最大连击</span><span class="stat-value" id="res-maxcombo">0</span></div>
          <div class="stat-row"><span class="stat-label">准确率</span><span class="stat-value" id="res-accuracy">0%</span></div>
          <div class="stat-row stat-breakdown"><span class="stat-label">Perfect</span><span class="stat-value perfect-color" id="res-perfect">0</span></div>
          <div class="stat-row stat-breakdown"><span class="stat-label">Good</span><span class="stat-value good-color" id="res-good">0</span></div>
          <div class="stat-row stat-breakdown"><span class="stat-label">OK</span><span class="stat-value ok-color" id="res-ok">0</span></div>
          <div class="stat-row stat-breakdown"><span class="stat-label">Miss</span><span class="stat-value miss-color" id="res-miss">0</span></div>
        </div>
        <div class="results-buttons">
          <button class="btn" onclick="location.reload()">再来一次</button>
          <a href="index.html" class="btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">返回首页</a>
        </div>
      </div>
    </div>
  </div>

  <noscript><div>请启用 JavaScript 以运行此游戏。</div></noscript>

  <script src="js/common.js"></script>
  <script src="js/drum.js"></script>
</body>
</html>
