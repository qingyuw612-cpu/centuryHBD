<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 生日快乐 Century!</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/ending.css">
</head>
<body>
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <canvas id="ending-canvas"></canvas>

  <!-- Main content -->
  <div id="ending-main">
    <!-- Left panel: game achievements -->
    <div id="panel-left" class="side-panel">
      <h3>🎮 冒险记录</h3>
      <div id="achievements"></div>
    </div>

    <!-- Center: birthday greeting -->
    <div id="panel-center">
      <div id="happy-birthday">Happy Birthday</div>
      <div id="century-name">Century</div>
      <div id="final-comment"></div>
    </div>

    <!-- Right panel: fun stats -->
    <div id="panel-right" class="side-panel">
      <h3>📊 趣味统计</h3>
      <div id="fun-stats"></div>
    </div>
  </div>

  <!-- Home button -->
  <div id="ending-links">
    <a href="index.html" class="btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">返回首页</a>
  </div>

  <script src="js/common.js"></script>
  <script src="js/ending.js"></script>
</body>
</html>
