<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📱 修手机 - Century</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/phone.css">
</head>
<body>
  <!-- Back button -->
  <a href="index.html" class="back-btn" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">◂</a>

  <div id="game-container">
    <!-- Phone outline area -->
    <div id="phone-outline">
      <div class="phone-frame">
        <!-- Slots for each part -->
        <div class="part-slot" id="slot-screen" data-part="screen"></div>
        <div class="part-slot" id="slot-battery" data-part="battery"></div>
        <div class="part-slot" id="slot-camera" data-part="camera"></div>
        <div class="part-slot" id="slot-backcover" data-part="backcover"></div>
        <div class="part-slot" id="slot-volbtn" data-part="volbtn"></div>
        <div class="part-slot" id="slot-powerbtn" data-part="powerbtn"></div>
        <div class="part-slot" id="slot-charge" data-part="charge"></div>
      </div>
    </div>

    <!-- Parts tray -->
    <div id="parts-tray">
      <div class="part" id="part-screen" data-part="screen">
        <span class="part-icon">📱</span>
        <span class="part-label">屏幕</span>
      </div>
      <div class="part" id="part-battery" data-part="battery">
        <span class="part-icon">🔋</span>
        <span class="part-label">电池</span>
      </div>
      <div class="part" id="part-camera" data-part="camera">
        <span class="part-icon">📷</span>
        <span class="part-label">摄像头</span>
      </div>
      <div class="part" id="part-backcover" data-part="backcover">
        <span class="part-icon">📦</span>
        <span class="part-label">后盖</span>
      </div>
      <div class="part" id="part-volbtn" data-part="volbtn">
        <span class="part-icon">🎚️</span>
        <span class="part-label">音量键</span>
      </div>
      <div class="part" id="part-powerbtn" data-part="powerbtn">
        <span class="part-icon">⏻</span>
        <span class="part-label">电源键</span>
      </div>
      <div class="part" id="part-charge" data-part="charge">
        <span class="part-icon">🔌</span>
        <span class="part-label">充电口</span>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-container">
      <div id="progress-bar"></div>
      <span id="progress-text">0/7</span>
    </div>

    <!-- Completion overlay -->
    <div id="completion" class="hidden">
      <div class="completion-card">
        <div class="completion-phone">
          <div class="phone-screen-on">📱</div>
        </div>
        <h2>修好了！</h2>
        <p id="completion-time"></p>
        <div class="completion-buttons">
          <button class="btn" onclick="location.reload()">再修一次</button>
          <a href="index.html" class="btn btn-small" onclick="event.preventDefault(); CenturyApp.navigateTo('index.html')">返回首页</a>
        </div>
      </div>
    </div>
  </div>

  <noscript>
    <div>请启用 JavaScript 以运行此游戏。</div>
  </noscript>

  <script src="js/common.js"></script>
  <script src="js/phone.js"></script>
</body>
</html>
